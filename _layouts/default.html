---
layout: nil
---

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono:wght@400;600&family=Literata:opsz,wght@7..72,400;7..72,500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/iosevka-fonts@1.0.0/dist/iosevka-charon/iosevka-charon.min.css" rel="stylesheet">

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/arduino-light.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"></script>
  <script>
    hljs.highlightAll();
    hljs.initLineNumbersOnLoad();
  </script>
</head>

<body>

  <!-- GLOBAL WRAPPER (width handled by SCSS) -->
  <div class="site-wrapper">

    <!-- AVATAR TOP-LEFT -->
    <img class="avatar-top-left"
         src="https://64.media.tumblr.com/ac00ecd5e34583cbc7a928c2a43a5871/5672a43dc4bb7df6-bf/s128x128u_c1/6bbd670d42cf9359c30ee9e3b879856b4d2bb004.jpg"
         alt="avatar">

    <!-- HEADER -->
    {% include header.html %}

    <!-- MAIN CONTENT -->
    <main class="page-content">
      {{ content }}
    </main>

    <!-- FOOTER -->
    {% include footer.html %}

  </div>

</body>
</html>
